name: Package and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: package-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package-windows:
    name: Package Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @curraint/core build

      - name: Build Windows installer
        run: pnpm --filter @curraint/desktop package -- --win

      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./packages/desktop/package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: curraint-${{ steps.version.outputs.version }}-windows
          path: |
            packages/desktop/dist/**/*.exe
            packages/desktop/dist/**/latest*.yml
          if-no-files-found: error

  package-macos:
    name: Package macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @curraint/core build

      - name: Build macOS package
        run: pnpm --filter @curraint/desktop package -- --mac

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./packages/desktop/package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: curraint-${{ steps.version.outputs.version }}-macos
          path: |
            packages/desktop/dist/**/*.dmg
            packages/desktop/dist/**/*.zip
          if-no-files-found: error

  package-linux:
    name: Package Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @curraint/core build

      - name: Build Linux packages
        run: pnpm --filter @curraint/desktop package -- --linux

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./packages/desktop/package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: curraint-${{ steps.version.outputs.version }}-linux
          path: |
            packages/desktop/dist/**/*.AppImage
            packages/desktop/dist/**/*.deb
          if-no-files-found: error

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [package-windows, package-macos, package-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.yml
            release-artifacts/**/*.dmg
            release-artifacts/**/*.zip
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
