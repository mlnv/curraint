name: Package Test Artifacts

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target platform to package"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - macos
          - linux

concurrency:
  group: package-test-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package-windows:
    name: Package Windows
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'windows')
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm package -- --win

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flowai-test-windows
          path: |
            dist/**/*.exe
            dist/**/latest*.yml
          if-no-files-found: error

  package-macos:
    name: Package macOS
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'macos')
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm package -- --mac

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flowai-test-macos
          path: |
            dist/**/*.dmg
            dist/**/*.zip
          if-no-files-found: error

  package-linux:
    name: Package Linux
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'linux')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm package -- --linux

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flowai-test-linux
          path: |
            dist/**/*.AppImage
            dist/**/*.deb
          if-no-files-found: error
