name: Package Test Artifacts

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target platform to package"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - macos
          - linux

env:
  RETENTION_DAYS: 3

concurrency:
  group: package-test-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package-windows:
    name: Package Windows
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'windows')
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @curraint/core build

      - name: Build package
        run: pnpm --filter @curraint/desktop package -- --win

      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./packages/desktop/package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: curraint-${{ steps.version.outputs.version }}-test-windows
          path: |
            packages/desktop/dist/**/*.exe
            packages/desktop/dist/**/latest*.yml
          if-no-files-found: error
          retention-days: ${{ env.RETENTION_DAYS }}

  package-macos:
    name: Package macOS
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'macos')
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @curraint/core build

      - name: Build package
        run: pnpm --filter @curraint/desktop package -- --mac

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./packages/desktop/package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: curraint-${{ steps.version.outputs.version }}-test-macos
          path: |
            packages/desktop/dist/**/*.dmg
            packages/desktop/dist/**/*.zip
          if-no-files-found: error
          retention-days: ${{ env.RETENTION_DAYS }}

  package-linux:
    name: Package Linux
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'linux')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @curraint/core build

      - name: Build package
        run: pnpm --filter @curraint/desktop package -- --linux

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./packages/desktop/package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: curraint-${{ steps.version.outputs.version }}-test-linux
          path: |
            packages/desktop/dist/**/*.AppImage
            packages/desktop/dist/**/*.deb
          if-no-files-found: error
          retention-days: ${{ env.RETENTION_DAYS }}
